name: match_point
description: "MatchPoint — Find players, challenge matches, track ratings."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2

  # Backend
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^2.6.1

  # Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2

  # Utilities
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

# App icon config — run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#F97316"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

# Splash screen config — run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/splash_logo.png"
  android_12:
    color: "#FFFFFF"
    icon_background_color: "#F97316"
    image: "assets/images/splash_logo.png"
